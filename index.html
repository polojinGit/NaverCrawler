<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 스토어 사무용품 신청 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #16a34a; 
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-gray-800 mb-2 flex items-center justify-center md:justify-start gap-2">
                <span class="text-green-500 font-black text-4xl">N</span> 네이버 스마트스토어 사무용품 신청 페이지
            </h1>
            <p class="text-gray-600">이 페이지는 확장 프로그램을 통해 등록된 신청 목록을 확인하는 용도입니다.</p>
            
            <div class="mt-3">
                <a href="https://shopping.naver.com/" target="_blank" class="inline-flex items-center text-green-600 hover:text-green-800 font-medium transition underline decoration-green-300 underline-offset-4 hover:decoration-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    네이버 쇼핑 바로가기
                </a>
            </div>
        </header>

        <!-- Action Bar -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-800">신청 목록 <span id="countBadge" class="bg-gray-200 text-gray-700 text-sm px-2 py-0.5 rounded-full ml-2">0</span></h2>
            <div class="flex gap-2">
                <button onclick="clearList()" class="px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg transition text-sm border border-transparent hover:border-red-100">전체 삭제</button>
                <button onclick="exportToExcel()" class="bg-gray-800 hover:bg-gray-900 text-white font-medium px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    엑셀 다운로드
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200 whitespace-nowrap">
                            <th class="p-4 font-medium w-32 bg-green-50 text-green-800">신청자</th>
                            <th class="p-4 font-medium w-28">상품코드</th>
                            <th class="p-4 font-medium min-w-[200px]">상품명</th>
                            <th class="p-4 font-medium w-64 bg-blue-50 text-blue-800">옵션</th>
                            <th class="p-4 font-medium w-24">비고</th>
                            <th class="p-4 font-medium w-20 min-w-[5rem]">수량</th>
                            <th class="p-4 font-medium w-28">단가</th>
                            <th class="p-4 font-medium w-32 text-orange-600 bg-orange-50/50">배송비<br><span class="text-[10px] text-gray-400 font-normal">(스토어 묶음)</span></th>
                            <th class="p-4 font-medium w-28 text-right">합계</th>
                            <th class="p-4 font-medium w-32 text-center text-gray-500">추가일시</th>
                            <th class="p-4 font-medium w-16 text-center">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody" class="text-sm divide-y divide-gray-100">
                        <tr id="emptyState">
                            <td colspan="11" class="p-8 text-center text-gray-400">
                                데이터 연결 대기 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Total Footer -->
            <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-end items-center gap-4">
                <span class="text-gray-600 font-medium">총 합계금액(배송비 포함):</span>
                <span class="text-2xl font-bold text-green-600" id="grandTotal">0원</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot, getDocs, writeBatch, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {
           apiKey: "AIzaSyAqf9h1kgRCjjzGzgiGgo2Q6FQEZ28zdjc",
           authDomain: "alphacrawler-51ef3.firebaseapp.com",
           projectId: "alphacrawler-51ef3",
           storageBucket: "alphacrawler-51ef3.firebasestorage.app",
           messagingSenderId: "854370361421",
           appId: "1:854370361421:web:7e966adb11ddc4304ffc04",
           measurementId: "G-V4GVSCQ2MF"
        };

        if (typeof __firebase_config !== 'undefined' && __firebase_config.trim() !== '') {
            try {
                firebaseConfig = JSON.parse(__firebase_config);
            } catch(e) { console.warn("Config parsing error"); }
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'naver-tool-v1';
        const COLLECTION_NAME = 'naver_cart_items';
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Init Error", e);
        }
        
        let unsubscribeSnapshot = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error:", e);
            }
        };
        if(auth) initAuth();

        if(auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    setupRealtimeListener(user);
                }
            });
        }

        function setupRealtimeListener(user) {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);

            unsubscribeSnapshot = onSnapshot(colRef, (snapshot) => {
                const items = [];
                snapshot.forEach(doc => {
                    items.push({ id: doc.id, ...doc.data() });
                });
                
                // 생성 시간순 정렬
                items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                renderTable(items);
            }, (error) => {
                console.error("Data sync error:", error);
            });
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${mm}.${dd}. ${hh}:${min}`;
        }

        function renderTable(items) {
            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = ''; 

            if (items.length === 0) {
                tableBody.innerHTML = `
                    <tr id="emptyState">
                        <td colspan="11" class="p-8 text-center text-gray-400">
                            등록된 상품이 없습니다. 확장 프로그램을 이용해 상품을 등록해주세요.
                        </td>
                    </tr>
                `;
                document.getElementById('grandTotal').innerText = '0원';
                document.getElementById('countBadge').innerText = 0;
                return;
            }

            // 스토어별로 상품 그룹화
            const groupedItems = {};
            items.forEach(item => {
                const store = item.storeName || '기본 스토어';
                if (!groupedItems[store]) groupedItems[store] = [];
                groupedItems[store].push(item);
            });

            let grandTotal = 0;

            for (const [storeName, storeItems] of Object.entries(groupedItems)) {
                
                // 스토어 그룹별 총 금액 및 배송비/임계값 산출
                let storeItemTotal = 0;
                let threshold = 0;
                let origFee = 0;

                storeItems.forEach(item => {
                    storeItemTotal += (parseInt(item.price || 0) * parseInt(item.qty || 0));
                    if (parseInt(item.freeShippingThreshold || 0) > threshold) {
                        threshold = parseInt(item.freeShippingThreshold || 0);
                    }
                    if (parseInt(item.originalDeliveryFee || item.deliveryFee || 0) > origFee) {
                        origFee = parseInt(item.originalDeliveryFee || item.deliveryFee || 0);
                    }
                });

                // 무료 배송 조건 체크에 따른 동적 배송비 산출
                let appliedFee = (threshold > 0 && storeItemTotal >= threshold) ? 0 : origFee;
                grandTotal += storeItemTotal + appliedFee;

                storeItems.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 group border-b border-gray-100 transition";
                    
                    const price = parseInt(item.price || 0);
                    const qty = parseInt(item.qty || 0);
                    
                    // 합계 가격 계산 시, 스토어의 첫 번째 항목에만 배송비(appliedFee)를 더해서 보여주도록 처리
                    const lineTotal = (price * qty) + (index === 0 ? appliedFee : 0);

                    let optionHtml = '';
                    if (item.option) {
                        // 옵션을 선택 불가능한 일반 텍스트 형태로 표시
                        optionHtml = `<span class="option-text text-gray-800 text-sm font-medium bg-gray-100 px-2 py-1 rounded-md border border-gray-200 block truncate max-w-xs" title="${item.option}">${item.option}</span>`;
                    } else {
                        optionHtml = `<span class="option-text text-gray-400 text-sm">-</span>`;
                    }

                    // 기본 셀 생성 (각 항목별 클래스 부여하여 파싱 오류 방지)
                    let tds = `
                        <td class="p-4">
                            <input type="text" value="${item.applicant}" readonly class="applicant-input w-full bg-transparent border-none outline-none text-green-800 font-bold bg-green-50 text-center rounded px-1 cursor-default">
                        </td>
                        <td class="p-4"><input type="text" value="${item.code}" readonly class="code-input w-full bg-transparent border-none outline-none text-gray-700 cursor-default text-xs"></td>
                        <td class="p-4">
                            <input type="text" value="${item.name}" readonly class="name-input w-full bg-transparent border-none outline-none font-medium text-gray-800 cursor-default truncate" title="${item.name}">
                            <input type="hidden" class="store-name-hidden" value="${storeName}">
                        </td>
                        
                        <td class="p-4">${optionHtml}</td>

                        <td class="p-4">
                            <input type="text" value="${item.remarks || ''}" placeholder="메모" class="remarks-input w-full bg-transparent border-b border-transparent focus:border-green-500 outline-none text-gray-600 text-sm" onchange="window.updateItem('${item.id}', 'remarks', this.value)">
                        </td>
                        
                        <td class="p-4"><input type="number" min="1" value="${item.qty}" class="qty-input w-full px-2 py-1 border border-gray-300 rounded focus:border-green-500 outline-none text-center" onchange="window.updateItem('${item.id}', 'qty', this.value)"></td>
                        <td class="p-4"><input type="text" value="${price.toLocaleString()}" readonly class="price-input w-full bg-transparent border-none outline-none text-right pr-2 cursor-default"></td>
                    `;

                    // 스토어별 그룹의 첫 번째 항목에만 '배송비' 셀을 병합(rowspan)하여 출력
                    if (index === 0) {
                        tds += `
                            <td class="p-4 border-l border-r border-gray-200 bg-orange-50/30 text-center align-middle" rowspan="${storeItems.length}">
                                <div class="flex flex-col items-center justify-center">
                                    <span class="text-xs text-gray-500 font-bold mb-1 truncate w-24" title="${storeName}">${storeName}</span>
                                    <input type="number" min="0" step="100" value="${appliedFee}" 
                                        class="fee-input w-full max-w-[80px] px-2 py-1 border border-gray-300 rounded focus:border-orange-500 outline-none text-right text-orange-600 font-medium bg-white" 
                                        onchange="window.updateStoreFee('${storeName}', this.value)">
                                    ${threshold > 0 ? `<span class="text-[10px] text-orange-500 mt-1 whitespace-nowrap">${threshold.toLocaleString()}원↑ 무료</span>` : ''}
                                </div>
                            </td>
                        `;
                    }

                    tds += `
                        <td class="p-4 text-right font-bold text-gray-800 line-total">${lineTotal.toLocaleString()}</td>
                        <td class="p-4 text-center text-xs text-gray-400 whitespace-nowrap date-text">${formatDate(item.createdAt)}</td>
                        <td class="hidden"><input type="hidden" class="link-input" value="${item.url || ''}"></td>
                        <td class="p-4 text-center">
                            <button onclick="window.deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 transition p-1" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </td>
                    `;

                    tr.innerHTML = tds;
                    tableBody.appendChild(tr);
                });
            }

            document.getElementById('grandTotal').innerText = grandTotal.toLocaleString() + '원';
            document.getElementById('countBadge').innerText = items.length;
        }

        window.updateItem = async function(docId, field, value) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId);
            let finalValue = value;
            if (field === 'price' || field === 'qty') {
                finalValue = String(value).replace(/,/g, '');
                if (isNaN(finalValue) || finalValue === '') finalValue = '0';
            }
            
            try {
                await updateDoc(docRef, { [field]: finalValue });
            } catch (e) {
                console.error("Update failed", e);
            }
        };

        // 스토어별 배송비를 일괄 업데이트하는 함수
        window.updateStoreFee = async function(storeName, newFee) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            
            const feeVal = String(newFee).replace(/,/g, '');
            if (isNaN(feeVal) || feeVal === '') return;

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
                const q = query(colRef, where("storeName", "==", storeName));
                const snapshot = await getDocs(q);

                const batch = writeBatch(db);
                snapshot.forEach((docSnap) => {
                    batch.update(docSnap.ref, { 
                        originalDeliveryFee: feeVal,
                        deliveryFee: feeVal
                    });
                });
                await batch.commit();
            } catch(e) {
                console.error("Store fee update failed", e);
            }
        };

        window.deleteItem = async function(docId) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            if(!confirm('삭제하시겠습니까?')) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId);
            await deleteDoc(docRef);
        };

        window.clearList = async function() {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            if(!confirm('모든 리스트를 삭제하시겠습니까?')) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
            const snapshot = await getDocs(colRef);
            const batch = writeBatch(db);
            snapshot.docs.forEach((doc) => {
                batch.delete(doc.ref);
            });
            await batch.commit();
        };

        window.exportToExcel = function() {
            try {
                if (typeof XLSX === 'undefined') {
                    alert('엑셀 라이브러리 로딩 중입니다.');
                    return;
                }
                const rows = document.querySelectorAll('#productTableBody tr:not(#emptyState)');
                if (rows.length === 0) { 
                    alert('내보낼 데이터가 없습니다.'); 
                    return; 
                }
                
                const data = [["스토어명", "신청자", "상품코드", "상품명", "옵션", "비고", "수량", "단가", "합계", "배송비(스토어별)", "추가일시", "상품링크"]];
                let total = 0;

                rows.forEach(row => {
                    const storeName = row.querySelector('.store-name-hidden')?.value || "";
                    const applicant = row.querySelector('.applicant-input')?.value || "";
                    const code = row.querySelector('.code-input')?.value || "";
                    const name = row.querySelector('.name-input')?.value || "";
                    
                    const select = row.querySelector('.option-select');
                    let optionVal = "";
                    if (select) {
                        optionVal = select.value;
                    } else {
                        optionVal = row.querySelector('.option-text')?.innerText.replace('-', '').trim() || "";
                    }

                    const remarks = row.querySelector('.remarks-input')?.value || "";
                    const qty = parseInt(row.querySelector('.qty-input')?.value) || 0;
                    const price = parseInt(row.querySelector('.price-input')?.value.replace(/,/g, '')) || 0;
                    
                    // 배송비는 스토어의 첫 번째 행에만 존재하므로, 있으면 출력하고 없으면 0 처리
                    const feeInput = row.querySelector('.fee-input');
                    const deliveryFee = feeInput ? (parseInt(feeInput.value.replace(/,/g, '')) || 0) : 0;
                    
                    const link = row.querySelector('.link-input')?.value || "";
                    const dateText = row.querySelector('.date-text')?.innerText.trim() || "";
                    
                    const sum = (price * qty) + deliveryFee;
                    total += sum;
                    
                    data.push([storeName, applicant, code, name, optionVal, remarks, qty, price, sum, deliveryFee, dateText, link]);
                });
                
                data.push(["", "", "", "총 합계", "", "", "", "", "", "", total, "", ""]);

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(data);
                
                ws['!cols'] = [
                    { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 40 }, { wch: 25 }, { wch: 20 },
                    { wch: 8 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 50 }
                ];
                
                XLSX.utils.book_append_sheet(wb, ws, "네이버공구리스트");
                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
                XLSX.writeFile(wb, `네이버쇼핑_공구리스트_${dateStr}.xlsx`);
            } catch (error) {
                console.error('Export Error:', error);
                alert('엑셀 파일 생성 중 오류가 발생했습니다.');
            }
        };

    </script>
</body>
</html>
