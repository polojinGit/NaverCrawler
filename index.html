<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 스토어 사무용품 신청 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #16a34a; /* 네이버 그린 느낌의 색상 */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-gray-800 mb-2 flex items-center justify-center md:justify-start gap-2">
                <span class="text-green-500 font-black text-4xl">N</span> 네이버 스마트스토어 사무용품 신청 페이지
            </h1>
            <p class="text-gray-600">스마트스토어 상품 링크를 넣으면 <strong>상품 정보와 옵션, 배송비를 자동으로 가져옵니다.</strong></p>
            
            <div class="mt-3">
                <a href="https://shopping.naver.com/" target="_blank" class="inline-flex items-center text-green-600 hover:text-green-800 font-medium transition underline decoration-green-300 underline-offset-4 hover:decoration-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    네이버 쇼핑 바로가기
                </a>
            </div>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 border-t-4 border-green-500">
            <!-- 1. 신청자 및 비고 입력 -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-4">
                <div class="md:col-span-3">
                    <label for="applicantInput" class="block text-sm font-medium text-gray-700 mb-1">신청자명 <span class="text-red-500 text-xs">(필수)</span></label>
                    <input type="text" id="applicantInput" placeholder="이름 입력" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition bg-green-50">
                </div>
                <div class="md:col-span-9">
                    <label for="remarksInput" class="block text-sm font-medium text-gray-700 mb-1">비고 <span class="text-gray-400 text-xs">(선택, 예: 품절시 대체상품 등)</span></label>
                    <input type="text" id="remarksInput" placeholder="필요시 메모를 남겨주세요" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition">
                </div>
            </div>

            <!-- 2. URL 입력 및 버튼 -->
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label for="urlInput" class="block text-sm font-medium text-gray-700 mb-1">상품 URL</label>
                    <input type="text" id="urlInput" 
                        placeholder="https://brand.naver.com/.../products/..." 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition"
                        onkeypress="handleEnter(event)">
                </div>
                <button onclick="fetchProductInfo()" id="addBtn" class="bg-green-600 hover:bg-green-700 text-white font-medium px-6 py-2 rounded-lg transition flex items-center gap-2 h-10 min-w-[120px] justify-center whitespace-nowrap">
                    <span id="btnText">상품 추가</span>
                    <div id="btnSpinner" class="loading-spinner hidden"></div>
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-2">* 옵션이 있는 상품은 목록에 추가된 후 <strong>드롭다운 박스</strong>에서 선택할 수 있습니다.</p>
        </div>

        <!-- Action Bar -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-800">신청 목록 <span id="countBadge" class="bg-gray-200 text-gray-700 text-sm px-2 py-0.5 rounded-full ml-2">0</span></h2>
            <div class="flex gap-2">
                <button onclick="clearList()" class="px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg transition text-sm border border-transparent hover:border-red-100">전체 삭제</button>
                <button onclick="exportToExcel()" class="bg-gray-800 hover:bg-gray-900 text-white font-medium px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    엑셀 다운로드
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200 whitespace-nowrap">
                            <th class="p-4 font-medium w-32 bg-green-50 text-green-800">신청자</th>
                            <th class="p-4 font-medium w-28">상품코드</th>
                            <th class="p-4 font-medium min-w-[200px]">상품명</th>
                            <th class="p-4 font-medium w-64 bg-blue-50 text-blue-800">옵션선택</th>
                            <th class="p-4 font-medium w-24">비고</th>
                            <th class="p-4 font-medium w-20 min-w-[5rem]">수량</th>
                            <th class="p-4 font-medium w-28">단가</th>
                            <th class="p-4 font-medium w-28 text-orange-600">배송비</th>
                            <th class="p-4 font-medium w-28 text-right">합계</th>
                            <th class="p-4 font-medium w-32 text-center text-gray-500">추가일시</th>
                            <th class="p-4 font-medium w-16 text-center">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody" class="text-sm divide-y divide-gray-100">
                        <tr id="emptyState">
                            <td colspan="11" class="p-8 text-center text-gray-400">
                                데이터 연결 대기 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Total Footer -->
            <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-end items-center gap-4">
                <span class="text-gray-600 font-medium">총 합계금액(배송비 포함):</span>
                <span class="text-2xl font-bold text-green-600" id="grandTotal">0원</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot, getDocs, writeBatch, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {
           apiKey: "AIzaSyAqf9h1kgRCjjzGzgiGgo2Q6FQEZ28zdjc",
           authDomain: "alphacrawler-51ef3.firebaseapp.com",
           projectId: "alphacrawler-51ef3",
           storageBucket: "alphacrawler-51ef3.firebasestorage.app",
           messagingSenderId: "854370361421",
           appId: "1:854370361421:web:7e966adb11ddc4304ffc04",
           measurementId: "G-V4GVSCQ2MF"
        };

        if (typeof __firebase_config !== 'undefined' && __firebase_config.trim() !== '') {
            try {
                firebaseConfig = JSON.parse(__firebase_config);
            } catch(e) { console.warn("Config parsing error"); }
        }

        // 기존 알파문구와 데이터가 섞이지 않도록 컬렉션명과 appId를 변경합니다.
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'naver-tool-v1';
        const COLLECTION_NAME = 'naver_cart_items';
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Init Error", e);
        }
        
        let unsubscribeSnapshot = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error:", e);
            }
        };
        if(auth) initAuth();

        if(auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    setupRealtimeListener(user);
                }
            });
        }

        function setupRealtimeListener(user) {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);

            unsubscribeSnapshot = onSnapshot(colRef, (snapshot) => {
                const items = [];
                snapshot.forEach(doc => {
                    items.push({ id: doc.id, ...doc.data() });
                });
                
                // 생성 시간순 정렬
                items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                renderTable(items);
            }, (error) => {
                console.error("Data sync error:", error);
            });
        }

        window.handleEnter = function(e) { if (e.key === 'Enter') window.fetchProductInfo(); }
        function cleanText(text) { return text ? text.replace(/\s+/g, ' ').trim() : ""; }
        
        function formatDate(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${mm}.${dd}. ${hh}:${min}`;
        }

        function renderTable(items) {
            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = ''; 

            if (items.length === 0) {
                tableBody.innerHTML = `
                    <tr id="emptyState">
                        <td colspan="11" class="p-8 text-center text-gray-400">
                            등록된 상품이 없습니다. 신청자명과 스마트스토어 URL을 입력하여 추가해주세요.
                        </td>
                    </tr>
                `;
                updateGrandTotal([]);
                document.getElementById('countBadge').innerText = 0;
                return;
            }

            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 group border-b border-gray-100 transition";
                
                const price = parseInt(item.price || 0);
                const qty = parseInt(item.qty || 0);
                const deliveryFee = parseInt(item.deliveryFee || 0);
                
                // 합계 계산 (단가 * 수량 + 배송비)
                const lineTotal = (price * qty) + deliveryFee;

                // --- 옵션 렌더링 로직 ---
                let optionHtml = '';
                if (item.optionList && item.optionList.length > 0) {
                    optionHtml = `<select class="w-full bg-blue-50 border border-blue-200 text-blue-800 text-sm rounded p-1 outline-none focus:border-blue-500" onchange="window.updateItem('${item.id}', 'option', this.value)">`;
                    
                    let hasSelected = false;
                    item.optionList.forEach(opt => {
                        const isSelected = item.option === opt ? 'selected' : '';
                        if(isSelected) hasSelected = true;
                        optionHtml += `<option value="${opt}" ${isSelected}>${opt}</option>`;
                    });
                    
                    if(!hasSelected && !item.option) {
                         optionHtml = `<option value="" selected disabled>옵션을 선택하세요</option>` + optionHtml;
                    } else if (!hasSelected && item.option) {
                        optionHtml += `<option value="${item.option}" selected>${item.option} (목록없음)</option>`;
                    }
                    optionHtml += `</select>`;
                } else {
                    optionHtml = `<span class="text-gray-400 text-sm">-</span>`;
                }

                tr.innerHTML = `
                    <td class="p-4">
                        <input type="text" value="${item.applicant}" readonly class="w-full bg-transparent border-none outline-none text-green-800 font-bold bg-green-50 text-center rounded px-1 cursor-default">
                    </td>
                    <td class="p-4"><input type="text" value="${item.code}" readonly class="w-full bg-transparent border-none outline-none text-gray-700 cursor-default text-xs"></td>
                    <td class="p-4"><input type="text" value="${item.name}" readonly class="w-full bg-transparent border-none outline-none font-medium text-gray-800 cursor-default truncate" title="${item.name}"></td>
                    
                    <td class="p-4">${optionHtml}</td>

                    <td class="p-4">
                        <input type="text" value="${item.remarks || ''}" placeholder="메모" class="w-full bg-transparent border-b border-transparent focus:border-green-500 outline-none text-gray-600 text-sm" onchange="window.updateItem('${item.id}', 'remarks', this.value)">
                    </td>
                    
                    <td class="p-4"><input type="number" min="1" value="${item.qty}" class="qty-input w-full px-2 py-1 border border-gray-300 rounded focus:border-green-500 outline-none text-center" onchange="window.updateItem('${item.id}', 'qty', this.value)"></td>
                    <td class="p-4"><input type="text" value="${price.toLocaleString()}" readonly class="price-input w-full bg-transparent border-none outline-none text-right pr-2 cursor-default"></td>
                    
                    <!-- 배송비 필드 추가 -->
                    <td class="p-4">
                        <input type="number" min="0" step="100" value="${deliveryFee}" class="fee-input w-full px-2 py-1 border border-gray-300 rounded focus:border-orange-500 outline-none text-right text-orange-600 font-medium" onchange="window.updateItem('${item.id}', 'deliveryFee', this.value)">
                    </td>

                    <td class="p-4 text-right font-bold text-gray-800 line-total">${lineTotal.toLocaleString()}</td>
                    
                    <td class="p-4 text-center text-xs text-gray-400 whitespace-nowrap">${formatDate(item.createdAt)}</td>
                    <td class="hidden"><input type="hidden" class="link-input" value="${item.url || ''}"></td>

                    <td class="p-4 text-center">
                        <button onclick="window.deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 transition p-1" title="삭제">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            updateGrandTotal(items);
            document.getElementById('countBadge').innerText = items.length;
        }

        function updateGrandTotal(items) {
            let total = 0;
            items.forEach(item => {
                const price = parseInt(item.price || 0);
                const qty = parseInt(item.qty || 0);
                const deliveryFee = parseInt(item.deliveryFee || 0);
                total += (price * qty) + deliveryFee;
            });
            document.getElementById('grandTotal').innerText = total.toLocaleString() + '원';
        }

        // --- Actions ---
        window.fetchProductInfo = async function() {
            if (!auth || !auth.currentUser) {
                try {
                    await signInAnonymously(auth);
                } catch(e) {
                    alert("로그인 상태가 아닙니다. 새로고침 후 다시 시도해주세요.");
                    return;
                }
            }

            const urlInput = document.getElementById('urlInput');
            const applicantInput = document.getElementById('applicantInput');
            const remarksInput = document.getElementById('remarksInput');
            
            let url = urlInput.value.trim();
            const applicant = applicantInput.value.trim();
            const remarks = remarksInput.value.trim();
            
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const addBtn = document.getElementById('addBtn');

            if (!applicant) {
                alert('신청자명을 입력해주세요.');
                applicantInput.focus();
                return;
            }
            if (!url) { 
                alert('URL을 입력해주세요.'); 
                urlInput.focus();
                return; 
            }
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            btnSpinner.classList.remove('hidden');
            btnText.textContent = '가져오는 중...';
            addBtn.disabled = true;

            try {
                let htmlContent = null;
                
                // 모바일 URL이 데스크탑보다 봇 차단을 우회할 확률이 높으므로 변환 시도
                let fetchUrl = url;
                if (!fetchUrl.includes('m.brand.naver.com') && fetchUrl.includes('brand.naver.com')) {
                    fetchUrl = fetchUrl.replace('brand.naver.com', 'm.brand.naver.com');
                } else if (!fetchUrl.includes('m.smartstore.naver.com') && fetchUrl.includes('smartstore.naver.com')) {
                    fetchUrl = fetchUrl.replace('smartstore.naver.com', 'm.smartstore.naver.com');
                }

                // 여러 우회 프록시 서버를 순차적으로 시도합니다.
                const proxyRequests = [
                    async () => {
                        const r = await fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(fetchUrl)}`);
                        if (!r.ok) throw new Error('Proxy 1 fail');
                        return await r.text();
                    },
                    async () => {
                        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fetchUrl)}`);
                        if (!r.ok) throw new Error('Proxy 2 fail');
                        const d = await r.json();
                        return d.contents;
                    },
                    async () => {
                        const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(fetchUrl)}`);
                        if (!r.ok) throw new Error('Proxy 3 fail');
                        return await r.text();
                    }
                ];

                for (const req of proxyRequests) {
                    try {
                        const text = await req();
                        // 반환된 HTML이 네이버의 시스템 에러 페이지가 아닌지 검증
                        if (text && !text.includes('[에러] 에러페이지') && !text.includes('시스템 오류') && !text.includes('요청하신 페이지를 찾을 수 없습니다')) {
                            htmlContent = text;
                            break; // 성공 시 반복문 종료
                        }
                    } catch (e) {
                        console.warn('Proxy try failed');
                    }
                }

                if (!htmlContent) {
                    throw new Error("네이버의 보안 정책(봇 차단)으로 인해 일시적으로 상품 정보를 가져올 수 없습니다. URL을 다시 확인해 주세요.");
                }

                // 스마트스토어 전용 파서 호출
                const result = parseNaverStore(htmlContent, url);
                
                // 추가 검증
                if (result.name.includes("에러페이지") || result.name.includes("시스템 오류")) {
                    throw new Error("상품 파싱에 실패했습니다. (차단된 페이지 응답)");
                }

                const parsedCode = result.code || "코드 확인 필요";
                
                let defaultOption = "";
                if (result.optionList && result.optionList.length > 0) {
                    defaultOption = result.optionList[0];
                }

                const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
                const q = query(colRef, 
                    where("applicant", "==", applicant),
                    where("code", "==", parsedCode),
                    where("option", "==", defaultOption)
                );
                
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const batch = writeBatch(db);
                    querySnapshot.forEach((doc) => {
                        batch.update(doc.ref, { 
                            createdAt: Date.now(),
                            remarks: remarks 
                        });
                    });
                    await batch.commit();
                } else {
                    const newItem = {
                        applicant: applicant,
                        remarks: remarks,
                        name: result.name || "상품명 파싱 실패",
                        code: parsedCode,
                        price: result.price || "0",
                        deliveryFee: result.deliveryFee || "0", // 배송비 정보 추가 저장
                        qty: 1,
                        url: url,
                        option: defaultOption,
                        optionList: result.optionList,
                        createdAt: Date.now()
                    };
                    await addDoc(colRef, newItem);
                }

                urlInput.value = ''; 
                remarksInput.value = '';
                urlInput.focus();

            } catch (error) {
                console.error(error);
                alert(error.message);
            } finally {
                btnSpinner.classList.add('hidden');
                btnText.textContent = '상품 추가';
                addBtn.disabled = false;
            }
        };

        window.updateItem = async function(docId, field, value) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId);
            let finalValue = value;
            if (field === 'price' || field === 'deliveryFee' || field === 'qty') {
                finalValue = String(value).replace(/,/g, '');
                if (isNaN(finalValue) || finalValue === '') finalValue = '0';
            }
            
            try {
                await updateDoc(docRef, { [field]: finalValue });
            } catch (e) {
                console.error("Update failed", e);
            }
        };

        window.deleteItem = async function(docId) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            if(!confirm('삭제하시겠습니까?')) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, docId);
            await deleteDoc(docRef);
        };

        window.clearList = async function() {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            if(!confirm('모든 리스트를 삭제하시겠습니까?')) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
            const snapshot = await getDocs(colRef);
            const batch = writeBatch(db);
            snapshot.docs.forEach((doc) => {
                batch.delete(doc.ref);
            });
            await batch.commit();
        };

        window.exportToExcel = function() {
            try {
                if (typeof XLSX === 'undefined') {
                    alert('엑셀 라이브러리 로딩 중입니다.');
                    return;
                }
                const rows = document.querySelectorAll('#productTableBody tr:not(#emptyState)');
                if (rows.length === 0) { 
                    alert('내보낼 데이터가 없습니다.'); 
                    return; 
                }
                
                const data = [["신청자", "상품코드", "상품명", "옵션", "비고", "수량", "단가", "배송비", "합계금액", "추가일시", "상품링크"]];
                let total = 0;

                rows.forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    const select = row.querySelector('select');
                    
                    const applicant = inputs[0].value;
                    const code = inputs[1].value;
                    const name = inputs[2].value;
                    
                    let optionVal = "";
                    if (select) {
                        optionVal = select.value;
                    } else {
                        const optionText = row.children[3].innerText.trim();
                        optionVal = optionText === '-' ? '' : optionText;
                    }

                    const remarks = inputs[3].value;
                    const qty = parseInt(inputs[4].value) || 0;
                    const price = parseInt(inputs[5].value.replace(/,/g, '')) || 0;
                    const deliveryFee = parseInt(inputs[6].value.replace(/,/g, '')) || 0; // 배송비
                    const link = row.querySelector('.link-input')?.value || "";
                    const dateText = row.children[9].innerText.trim();
                    
                    const sum = (price * qty) + deliveryFee;
                    total += sum;
                    
                    data.push([applicant, code, name, optionVal, remarks, qty, price, deliveryFee, sum, dateText, link]);
                });
                
                data.push(["", "", "총 합계", "", "", "", "", "", total, "", ""]);

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(data);
                
                ws['!cols'] = [
                    { wch: 15 }, { wch: 15 }, { wch: 40 }, { wch: 25 }, { wch: 20 },
                    { wch: 8 }, { wch: 12 }, { wch: 12 }, { wch: 15 }, { wch: 20 }, { wch: 50 }
                ];
                
                XLSX.utils.book_append_sheet(wb, ws, "네이버공구리스트");
                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
                XLSX.writeFile(wb, `네이버쇼핑_공구리스트_${dateStr}.xlsx`);
            } catch (error) {
                console.error('Export Error:', error);
                alert('엑셀 파일 생성 중 오류가 발생했습니다.');
            }
        };

        // --- 네이버 스마트스토어 파싱 로직 ---
        function parseNaverStore(html, url) {
            let name = "";
            let code = "";
            let price = "0";
            let deliveryFee = "0";
            let optionList = [];

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // 1. 상품명 파싱
            const titleEl = doc.querySelector('h3.DCVBehA8ZB') || doc.querySelector('h3._copyable') || doc.querySelector('.prod_info_title');
            if (titleEl) {
                name = cleanText(titleEl.innerText);
            } else {
                const ogTitle = doc.querySelector('meta[property="og:title"]');
                if (ogTitle) name = ogTitle.content.split(':')[0].trim();
                else {
                    const titleTag = doc.querySelector('title');
                    if(titleTag) name = titleTag.innerText.split(':')[0].trim();
                }
            }

            // 2. 가격 파싱 (할인가 우선)
            const salePriceEl = doc.querySelector('.Se0UVy4E71');
            const orgPriceEl = doc.querySelector('.e1DMQNBPJ_') || doc.querySelector('.Xu9MEKUuIo .e1DMQNBPJ_');
            if (salePriceEl) {
                price = salePriceEl.innerText.replace(/[^0-9]/g, '');
            } else if (orgPriceEl) {
                price = orgPriceEl.innerText.replace(/[^0-9]/g, '');
            }
            // DOM에서 못찾을 경우 정규식으로 JSON 탐색
            if (!price || price === "0") {
                const priceMatch = html.match(/"salePrice"\s*:\s*(\d+)/) || html.match(/"price"\s*:\s*(\d+)/) || html.match(/"productPrice"\s*:\s*(\d+)/);
                if (priceMatch) price = priceMatch[1];
            }

            // 3. 상품코드 파싱
            const urlMatch = url.match(/\/products\/(\d+)/);
            if (urlMatch) {
                code = urlMatch[1];
            } else {
                const codeMatch = html.match(/"productNo"\s*:\s*"(\d+)"/);
                if (codeMatch) code = codeMatch[1];
                else code = "코드확인필요";
            }

            // 4. 배송비 파싱
            const feeMatch = html.match(/"deliveryFeeAmount"\s*:\s*(\d+)/) || html.match(/"baseFee"\s*:\s*(\d+)/);
            if (feeMatch) {
                deliveryFee = feeMatch[1];
            } else {
                const feeTextMatch = html.match(/배송비.*?([0-9,]+)원/);
                if (feeTextMatch) deliveryFee = feeTextMatch[1].replace(/[^0-9]/g, '');
            }

            // 5. 옵션 파싱 (스크립트 내 JSON 데이터 탐색)
            try {
                // 스토어 상태 데이터 추출 시도
                const stateMatch = html.match(/window\.__PRELOADED_STATE__\s*=\s*({.+?})(?:<\/script>|;\s*window\.)/);
                if (stateMatch) {
                    const stateStr = stateMatch[1]; // 전체를 JSON.parse하면 너무 크므로 정규식으로 필요값만 축출
                    // "optionName":"색상", "optionValues":[{"value":"블랙"}, ...] 형태 추출
                    const optMatches = stateStr.match(/"optionName"\s*:\s*"([^"]+)"\s*,\s*"optionValues"\s*:\s*\[([^\]]+)\]/g);
                    if (optMatches) {
                        optMatches.forEach(matchStr => {
                            const nameMatch = matchStr.match(/"optionName"\s*:\s*"([^"]+)"/);
                            let optName = nameMatch ? nameMatch[1] : "옵션";
                            
                            const valsMatch = matchStr.match(/"value"\s*:\s*"([^"]+)"/g);
                            if (valsMatch) {
                                valsMatch.forEach(v => {
                                    const val = v.match(/"value"\s*:\s*"([^"]+)"/)[1];
                                    optionList.push(optName + ": " + val);
                                });
                            }
                        });
                    }
                }
            } catch(e) {
                console.warn("옵션 파싱 에러", e);
            }

            // 옵션을 찾지 못했을 경우 단순 옵션 구조 탐색
            if (optionList.length === 0) {
                const simpleOptMatch = html.match(/"simpleOptionContents"\s*:\s*\[(.*?)\]/);
                if (simpleOptMatch) {
                    const valsMatch = simpleOptMatch[1].match(/"value"\s*:\s*"([^"]+)"/g);
                    if (valsMatch) {
                         valsMatch.forEach(v => {
                            const val = v.match(/"value"\s*:\s*"([^"]+)"/)[1];
                            optionList.push(val);
                        });
                    }
                }
            }

            return { name, code, price, deliveryFee, optionList };
        }
    </script>
